server:
  port:
    8080

app:
  hashids:
    salt: ${SALT}
    min-length: ${LINK_SIZE}

spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME_LOCAL}
    username: ${DB_USER_LOCAL}
    password: ${DB_PASSWORD_LOCAL}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect